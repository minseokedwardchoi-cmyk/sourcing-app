name: 백엔드 keep-warm (콜드스타트 방지)

# Render 무료 티어는 15분 idle 후 인스턴스를 내려서, 다음 첫 요청이 30~60초 콜드스타트로
# 걸린다(모든 페이지·리스트·필터 로딩이 그만큼 지연). 사용자 활동 시간대에 /health를
# 주기적으로 찔러 인스턴스를 깨워 둔다.
#
# 실행 시간대(UTC 22:00~14:59 = KST 07:00~23:59)만 켜서 월 인스턴스 시간(무료 750h)을
# 넉넉히(~480h) 남긴다. 이 시간대 밖 첫 방문자는 콜드스타트 1회를 감수한다.
# GitHub Actions 스케줄은 부하에 따라 수 분 지연될 수 있어 10분 간격으로 여유를 둔다.

on:
  schedule:
    - cron: '*/10 22,23 * * *'   # UTC 22:00~23:59 (KST 07:00~08:59)
    - cron: '*/10 0-14 * * *'    # UTC 00:00~14:59 (KST 09:00~23:59)
  workflow_dispatch:

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: |
          URL="${{ secrets.BACKEND_URL }}"
          URL="${URL:-https://sourcing-backend-ucp5.onrender.com}"
          echo "Pinging ${URL}/health ..."
          # 콜드스타트로 첫 응답이 오래 걸릴 수 있으니 넉넉히 대기(최대 90초).
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "${URL}/health" || echo "000")
          echo "HTTP ${code}"
          # 깨우는 게 목적이라 비정상 코드여도 워크플로를 실패시키지 않는다.
          exit 0
