name: 수입이력 자동 수집 및 업로드

on:
  # 매일 오전 2시 (KST) = UTC 17:00 전날
  schedule:
    - cron: '0 17 * * *'

  # 수동 실행 (초기 백필 또는 재실행용)
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (YYYY-MM-DD) — 비워두면 어제'
        required: false
        default: ''
      end_date:
        description: '종료일 (YYYY-MM-DD) — 비워두면 어제'
        required: false
        default: ''

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 수입이력 수집 및 업로드
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          HEADLESS: '1'
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            python3 scripts/crawl_and_upload.py \
              --start "${{ github.event.inputs.start_date }}" \
              --end "${{ github.event.inputs.end_date }}"
          else
            python3 scripts/crawl_and_upload.py
          fi
