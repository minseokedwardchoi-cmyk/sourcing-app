name: 수입이력 자동 수집 및 업로드

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 00:00 KST (지연 감안 ~02:00 실행)
  workflow_dispatch:
    inputs:
      start_date:
        description: '시작일 (YYYY-MM-DD) — 비워두면 어제'
        required: false
        default: ''
      end_date:
        description: '종료일 (YYYY-MM-DD) — 비워두면 어제'
        required: false
        default: ''

jobs:
  trigger-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Render 백엔드에 크롤링 요청
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"

          if [ -n "$START" ] && [ -n "$END" ]; then
            URL="${{ secrets.BACKEND_URL }}/api/crawl?start_date=${START}&end_date=${END}"
          else
            URL="${{ secrets.BACKEND_URL }}/api/crawl"
          fi

          echo "요청 URL: $URL"
          curl -sf --max-time 7200 -X POST "$URL" | jq .
